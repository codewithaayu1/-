<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="ui-container">
        <h1 class="title">I Have Something To Ask...</h1>
        <p class="subtitle">Look at the heart below 💍</p>
        
        <div class="buttons">
            <button id="yesBtn" class="btn yes">YES 💖</button>
            <button id="noBtn" class="btn no">NO 😢</button>
        </div>
    </div>

    <div id="bg-animation"></div>

    <!-- Hidden Surprise Message -->
    <div id="message" class="hidden">
        <h1>I LOVE YOU! ❤️</h1>
        <p>See you at the altar! 😘</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
