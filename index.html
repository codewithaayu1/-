<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            transition: opacity 0.5s;
        }

        .title {
            font-size: 3rem;
            text-shadow: 0 0 10px #ff0055;
            animation: pulse 1.5s infinite;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            outline: none;
        }

        .yes {
            background: linear-gradient(45deg, #ff0055, #ff00aa);
            color: white;
            box-shadow: 0 0 20px #ff0055;
        }

        .no {
            background: #333;
            color: #777;
            border: 2px solid #555;
        }

        .btn:hover { transform: scale(1.1); }

        .cat-container {
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }

        .cat { font-size: 3rem; position: absolute; animation: catMove 2s ease-in-out infinite; }
        .cat-left { left: -120px; top: -30px; }
        .cat-right { right: -120px; top: -30px; animation-delay: 1s; }

        @keyframes catMove {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        #musicControls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .music-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .music-btn.active { background: rgba(0, 255, 0, 0.3); border-color: #00ff00; }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00ff00;
            text-align: center;
            display: none;
            z-index: 20;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
            max-width: 95%;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #message h1 { color: #00ff00; font-size: 2.5rem; margin-bottom: 15px; }

        #changing-text {
            font-size: 1.5rem;
            color: #fff;
            min-height: 50px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .blink { animation: blinkAnim 0.5s infinite; }

        @keyframes blinkAnim {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .ring-container { position: relative; width: 80px; height: 80px; margin: 0 auto 15px; }
        .ring { font-size: 3.5rem; animation: ringShine 2s infinite; }

        @keyframes ringShine {
            0%, 100% { transform: rotate(0deg) scale(1); filter: brightness(1); }
            50% { transform: rotate(15deg) scale(1.1); filter: brightness(1.5); }
        }

        .photo-frame {
            width: 150px; height: 150px; margin: 15px auto;
            border: 8px solid white; border-radius: 10px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .love-calculator { background: rgba(255, 0, 85, 0.2); padding: 15px; border-radius: 15px; margin: 15px 0; }
        .love-calculator h3 { color: #ff69b4; margin-bottom: 10px; }
        .love-result { font-size: 2rem; color: #ff1493; font-weight: bold; animation: pulse 1s infinite; }

        /* ⏳ COUNTDOWN TIMER STYLES - ADDED! */
        .countdown-section {
            background: linear-gradient(45deg, #1a1a2e, #16213e);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px solid #00ff00;
        }

        .countdown-label {
            font-size: 1.2rem;
            color: #00ff00;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(0, 255, 0, 0.1);
            padding: 15px 20px;
            border-radius: 10px;
            min-width: 70px;
            border: 1px solid #00ff00;
        }

        .time-box .number {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff00;
            display: block;
        }

        .time-box .label {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .action-btn {
            padding: 10px 20px;
            font-size: 1rem;
            border: 2px solid #00ff00;
            background: transparent;
            color: #00ff00;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #00ff00;
            color: black;
            transform: scale(1.05);
        }

        .love-letter {
            background: linear-gradient(to bottom, #fff8dc, #f5deb3);
            color: #8b4513;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-style: italic;
            text-align: left;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .letter-text { font-size: 1rem; line-height: 1.8; min-height: 80px; }

        .promises {
            background: rgba(0, 255, 0, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            text-align: left;
        }

        .promises h3 { color: #00ff00; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        .promise-item { display: flex; align-items: center; margin: 8px 0; opacity: 0; animation: fadeIn 0.5s forwards; }
        .promise-item span { margin-right: 10px; font-size: 1.2rem; }

        @keyframes fadeIn { to { opacity: 1; } }

        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; font-size: 1.5rem; cursor: pointer; pointer-events: auto; animation: twinkle 2s infinite; }
        .star:hover { transform: scale(1.5); }
        @keyframes twinkle { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .kiss { position: fixed; font-size: 2rem; pointer-events: none; z-index: 1000; animation: flyKiss 2s forwards; }
        @keyframes flyKiss { 0% { opacity: 1; transform: translate(0, 0); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)); } }

        .hug-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; align-items: center;
            justify-content: center; z-index: 2000; flex-direction: column;
        }

        .hug-emoji { font-size: 8rem; animation: hugAnim 1s infinite; }
        @keyframes hugAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .hug-text { font-size: 2rem; color: #ff69b4; margin-top: 20px; animation: pulse 1s infinite; }

        .future-plans { margin-top: 20px; background: rgba(255, 105, 180, 0.1); padding: 15px; border-radius: 15px; }
        .future-plans h3 { color: #ff69b4; margin-bottom: 15px; }
        .plan-item { display: flex; align-items: center; margin: 8px 0; opacity: 0; animation: fadeIn 0.5s forwards; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ff0055; border-radius: 4px; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>
    <div class="cat-container" id="cats" style="display: none;">
        <div class="cat cat-left">🐱</div>
        <div class="cat cat-right">😸</div>
    </div>

    <div class="hug-overlay" id="hugOverlay" onclick="closeHug()">
        <div class="hug-emoji">🤗</div>

    <div id="musicControls">

    <div id="message">

                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" onclick="sendHug()">🤗 Hug</button>
            <button class="action-btn" onclick="sendKiss()">😘 Kiss</button>
            <button class="action-btn" onclick="showLetter()">💌 Letter</button>
            <button class="action-btn" onclick="showPromises()">💝 Promises</button>
        </div>
        
        <div class="love-letter" id="loveLetter" style="display: none;">
            <div class="letter-text" id="letterText"></div>
        </div>
        
        <div class="promises" id="promises" style="display: none;">
            <h3>💝 My Promises To You</h3>
            <div id="promisesList"></div>
        </div>
        
        <div class="future-plans">
            <h3>🚀 Our Future Plans</h3>
            <div id="plansContainer"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
